<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lock Screen Card Generator | VGV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #060d22;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
      text-align: center;
    }

    .app-layout {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1100px;
      width: 100%;
    }

    /* ── Form ── */
    .form-panel {
      width: 340px;
      flex-shrink: 0;
    }

    .form-panel label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    .linkedin-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .linkedin-row input {
      flex: 1;
      margin-bottom: 0 !important;
    }

    .btn-fetch {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-fetch:hover {
      background: rgba(42,72,222,0.25);
      border-color: rgba(42,72,222,0.4);
      color: #fff;
    }

    .btn-fetch.loading {
      pointer-events: none;
      opacity: 0.5;
    }

    .btn-fetch svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-fetch.loading svg {
      animation: spin 0.8s linear infinite;
    }

    .fetch-status {
      font-size: 11px;
      margin-top: -14px;
      margin-bottom: 16px;
      min-height: 16px;
    }

    .fetch-status.success { color: rgba(0,229,0,0.7); }
    .fetch-status.error { color: rgba(255,255,255,0.35); }

    .form-panel input[type="text"],
    .form-panel input[type="url"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    .form-panel input:focus {
      border-color: rgba(42,72,222,0.6);
    }

    .form-panel input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .headshot-upload {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .headshot-preview {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.18);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }

    .headshot-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .headshot-preview .initials {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
    }

    .headshot-preview .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 50%;
    }

    .headshot-preview:hover .overlay {
      opacity: 1;
    }

    .headshot-preview .overlay svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .headshot-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }

    .headshot-label strong {
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2A48DE;
      color: #fff;
    }
    .btn-primary:hover { background: #3355f0; }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    /* ── Preview container ── */
    .preview-panel {
      position: relative;
    }

    .preview-frame {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.06);
      position: relative;
    }

    /* ── Wallpaper (the exportable area) ── */
    .wallpaper {
      width: 1170px;
      height: 2532px;
      position: relative;
      overflow: hidden;
      transform-origin: top left;
      transform: scale(0.33333);
    }

    .wallpaper-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(168deg, #060d22 0%, #0e1a42 20%, #1a2d7a 40%, #2A48DE 58%, #1f3599 75%, #0A1530 100%);
    }

    .glow-blue {
      position: absolute;
      width: 520px;
      height: 520px;
      top: 280px;
      left: -60px;
      background: radial-gradient(circle, rgba(42,72,222,0.3) 0%, transparent 70%);
      filter: blur(70px);
      pointer-events: none;
    }

    .glow-purple {
      position: absolute;
      width: 400px;
      height: 400px;
      top: 900px;
      right: -40px;
      background: radial-gradient(circle, rgba(100,32,198,0.3) 0%, transparent 70%);
      filter: blur(70px);
      pointer-events: none;
    }

    /* Sparkles */
    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      fill: rgba(255,255,255,0.10);
    }

    /* Content area — vertically positioned below clock zone */
    .wallpaper-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -45%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .logo-wrap {
      width: 580px;
      margin-bottom: 64px;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
    }

    /* Info card */
    .info-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 40px;
      padding: 36px 40px;
      display: flex;
      align-items: center;
      gap: 36px;
      max-width: 85%;
    }

    .qr-wrap {
      background: #fff;
      border-radius: 24px;
      padding: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrap canvas,
    .qr-wrap img {
      display: block;
      width: 280px !important;
      height: 280px !important;
      border-radius: 4px;
    }

    .person-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .person-headshot {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.22);
      overflow: hidden;
      background: rgba(255,255,255,0.08);
    }

    .person-headshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .person-headshot .initials-lg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 36px;
      color: rgba(255,255,255,0.7);
    }

    .person-name {
      font-weight: 700;
      font-size: 32px;
      color: #fff;
      line-height: 1.2;
    }

    .person-title {
      font-weight: 500;
      font-size: 24px;
      color: rgba(255,255,255,0.6);
      line-height: 1.3;
    }

    /* Placeholder states */
    .person-name.empty,
    .person-title.empty {
      opacity: 0.2;
    }

    .qr-placeholder {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(10,21,48,0.25);
      font-size: 14px;
      font-weight: 500;
    }

    /* Export spinner */
    .export-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,13,34,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .export-overlay.active { display: flex; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #2A48DE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .export-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* Responsive */
    @media (max-width: 860px) {
      .app-layout { flex-direction: column; align-items: center; }
      .form-panel { width: 100%; max-width: 390px; }
    }
  </style>
</head>

  <!-- Export overlay -->
  <div class="export-overlay" id="exportOverlay">
    <div class="spinner"></div>
    <div class="export-label">Generating wallpaper...</div>
  </div>

  <script>
    // ── Elements ──
    const fullNameInput = document.getElementById('fullName');
    const titleInput = document.getElementById('titleField');
    const linkedinInput = document.getElementById('linkedinUrl');
    const headshotFile = document.getElementById('headshotFile');
    const headshotPreview = document.getElementById('headshotPreview');
    const headshotImg = document.getElementById('headshotImg');
    const headshotInitials = document.getElementById('headshotInitials');
    const personName = document.getElementById('personName');
    const personTitle = document.getElementById('personTitle');
    const personHeadshot = document.getElementById('personHeadshot');
    const personHeadshotImg = document.getElementById('personHeadshotImg');
    const personInitials = document.getElementById('personInitials');
    const qrContainer = document.getElementById('qrCode');
    const btnPng = document.getElementById('btnPng');
    const btnJpg = document.getElementById('btnJpg');
    const exportOverlay = document.getElementById('exportOverlay');

    const btnFetch = document.getElementById('btnFetch');
    const fetchStatus = document.getElementById('fetchStatus');

    let qrInstance = null;
    let uploadedImageData = null;

    // ── Sparkles ──
    function generateSparkles() {
      const container = document.getElementById('sparkles');
      const sparkleData = [
        { x: 8, y: 5, size: 18 }, { x: 85, y: 12, size: 14 }, { x: 15, y: 25, size: 22 },
        { x: 72, y: 20, size: 16 }, { x: 92, y: 35, size: 20 }, { x: 5, y: 45, size: 12 },
        { x: 50, y: 8, size: 15 }, { x: 30, y: 55, size: 18 }, { x: 78, y: 60, size: 14 },
        { x: 12, y: 70, size: 20 }, { x: 60, y: 75, size: 16 }, { x: 88, y: 80, size: 12 },
        { x: 40, y: 88, size: 18 }, { x: 20, y: 92, size: 14 }, { x: 70, y: 95, size: 16 },
        { x: 95, y: 50, size: 13 }, { x: 45, y: 40, size: 11 }, { x: 55, y: 65, size: 17 },
      ];
      sparkleData.forEach(s => {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', 'sparkle');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('width', s.size);
        svg.setAttribute('height', s.size);
        svg.style.left = s.x + '%';
        svg.style.top = s.y + '%';
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5Z');
        svg.appendChild(path);
        container.appendChild(svg);
      });
    }
    generateSparkles();

    // ── Initials ──
    function getInitials(name) {
      if (!name.trim()) return '';
      const parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function updateInitials() {
      const initials = getInitials(fullNameInput.value);
      headshotInitials.textContent = initials;
      personInitials.textContent = initials;
    }

    // ── Live preview updates ──
    fullNameInput.addEventListener('input', () => {
      const val = fullNameInput.value.trim();
      personName.textContent = val || 'Your Name';
      personName.classList.toggle('empty', !val);
      updateInitials();
    });

    titleInput.addEventListener('input', () => {
      const val = titleInput.value.trim();
      personTitle.textContent = val || 'Your Title';
      personTitle.classList.toggle('empty', !val);
    });

    // ── QR Code ──
    let qrDebounce = null;
    linkedinInput.addEventListener('input', () => {
      clearTimeout(qrDebounce);
      qrDebounce = setTimeout(updateQR, 300);
    });

    function updateQR() {
      const url = linkedinInput.value.trim();
      qrContainer.innerHTML = '';

      if (!url) {
        qrContainer.innerHTML = '<div class="qr-placeholder">Enter LinkedIn URL</div>';
        return;
      }

      qrInstance = new QRCode(qrContainer, {
        text: url,
        width: 280,
        height: 280,
        colorDark: '#0A1530',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    // ── Fetch LinkedIn photo ──
    btnFetch.addEventListener('click', async () => {
      const url = linkedinInput.value.trim();
      if (!url || !url.includes('linkedin.com/in/')) {
        fetchStatus.textContent = 'Enter a valid LinkedIn URL first';
        fetchStatus.className = 'fetch-status error';
        return;
      }

      btnFetch.classList.add('loading');
      fetchStatus.textContent = 'Fetching photo...';
      fetchStatus.className = 'fetch-status';

      try {
        const endpoint = `/.netlify/functions/linkedin-photo?url=${encodeURIComponent(url)}`;
        const res = await fetch(endpoint);

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Could not fetch photo');
        }

        const contentType = res.headers.get('content-type') || '';

        if (contentType.startsWith('image/')) {
          const blob = await res.blob();
          const imageData = URL.createObjectURL(blob);

          // Set in both form preview and wallpaper
          headshotImg.src = imageData;
          headshotImg.style.display = 'block';
          headshotInitials.style.display = 'none';

          personHeadshotImg.src = imageData;
          personHeadshotImg.style.display = 'block';
          personInitials.style.display = 'none';

          uploadedImageData = imageData;

          fetchStatus.textContent = 'Photo loaded — you can still override with upload';
          fetchStatus.className = 'fetch-status success';
        } else {
          // Got JSON with imageUrl fallback
          const data = await res.json();
          if (data.imageUrl) {
            headshotImg.src = data.imageUrl;
            headshotImg.style.display = 'block';
            headshotInitials.style.display = 'none';
            personHeadshotImg.src = data.imageUrl;
            personHeadshotImg.style.display = 'block';
            personInitials.style.display = 'none';
            fetchStatus.textContent = 'Photo loaded';
            fetchStatus.className = 'fetch-status success';
          } else {
            throw new Error('No image found');
          }
        }
      } catch (err) {
        fetchStatus.textContent = err.message + ' — upload manually instead';
        fetchStatus.className = 'fetch-status error';
      } finally {
        btnFetch.classList.remove('loading');
      }
    });

    // ── Headshot upload ──
    headshotPreview.addEventListener('click', () => headshotFile.click());

    headshotFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        uploadedImageData = ev.target.result;

        // Form preview
        headshotImg.src = uploadedImageData;
        headshotImg.style.display = 'block';
        headshotInitials.style.display = 'none';

        // Wallpaper preview
        personHeadshotImg.src = uploadedImageData;
        personHeadshotImg.style.display = 'block';
        personInitials.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // ── Export ──
    async function exportWallpaper(format) {
      exportOverlay.classList.add('active');

      const wallpaper = document.getElementById('wallpaper');
      const origTransform = wallpaper.style.transform;
      wallpaper.style.transform = 'none';

      // Small delay for layout to settle
      await new Promise(r => setTimeout(r, 100));

      try {
        const canvas = await html2canvas(wallpaper, {
          width: 1170,
          height: 2532,
          scale: 1,
          useCORS: true,
          backgroundColor: null,
          logging: false,
        });

        const firstName = fullNameInput.value.trim().split(/\s+/)[0] || 'unnamed';
        const lastName = fullNameInput.value.trim().split(/\s+/).slice(1).join('-') || '';
        const slug = [firstName, lastName].filter(Boolean).join('-').toLowerCase().replace(/[^a-z0-9-]/g, '');

        let link = document.createElement('a');
        if (format === 'jpg') {
          link.download = `vgv-card-${slug}.jpg`;
          link.href = canvas.toDataURL('image/jpeg', 0.92);
        } else {
          link.download = `vgv-card-${slug}.png`;
          link.href = canvas.toDataURL('image/png');
        }
        link.click();
      } catch (err) {
        console.error('Export failed:', err);
        alert('Export failed. Check console for details.');
      } finally {
        wallpaper.style.transform = origTransform;
        exportOverlay.classList.remove('active');
      }
    }

    btnPng.addEventListener('click', () => exportWallpaper('png'));
    btnJpg.addEventListener('click', () => exportWallpaper('jpg'));

    // ── Init ──
    updateInitials();
  </script>
</body>
</html>
